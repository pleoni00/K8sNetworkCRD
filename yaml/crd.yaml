apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networkgraphs.networking.pleoni00.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.12.0
spec:
  group: networking.pleoni00.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              nodes:
                type: array
                description: "Lista dei nodi nel grafo (pod o nodi K8s)"
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: "Identificatore univoco del nodo"
                    name:
                      type: string
                      description: "Nome del nodo"
                    type:
                      type: string
                      enum: ["pod", "node", "service"]
                      description: "Tipo di nodo (pod, node, service)"
                    ip:
                      type: string
                      description: "Indirizzo IP del nodo"
                    state:
                      type: string
                      enum: ["running", "pending", "failed", "unknown"]
                      description: "Stato del nodo"
                    cpu_usage_millicores:
                      type: integer
                      description: "Current CPU usage in millicores (populated by ebpf-controller)"
                    memory_bytes:
                      type: integer
                      description: "Current memory usage in bytes (populated by ebpf-controller)"
                  required: ["id", "name", "type"]
              edges:
                type: array
                description: "Lista degli archi rappresentanti il traffico"
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: "Identificatore univoco dell'arco"
                    source:
                      type: string
                      description: "ID del nodo sorgente"
                    target:
                      type: string
                      description: "ID del nodo destinazione"
                    traffic:
                      type: object
                      properties:
                        protocol:
                          type: string
                          enum: ["TCP", "UDP", "ICMP", "HTTP", "HTTPS", "gRPC"]
                          description: "Protocollo di comunicazione"
                        port:
                          type: integer
                          minimum: 1
                          maximum: 65535
                          description: "Porta di destinazione"
                        bytes:
                          type: integer
                          description: "Bytes trasferiti"
                        packets:
                          type: integer
                          description: "Pacchetti trasferiti"
                        connections:
                          type: integer
                          description: "Numero di connessioni"
                        latency:
                          type: string
                          pattern: '^[0-9]+(\.[0-9]+)?(ns|us|ms|s)$'
                          description: "Latenza media (es: 15ms)"
                        bandwidth:
                          type: string
                          pattern: '^[0-9]+(\.[0-9]+)?(bps|Kbps|Mbps|Gbps)$'
                          description: "Banda utilizzata (es: 100Mbps)"
                        direction:
                          type: string
                          enum: ["bidirectional", "unidirectional"]
                          default: "unidirectional"
                          description: "Direzione del traffico"
                    timestamp:
                      type: string
                      format: date-time
                      description: "Timestamp dell'ultima misurazione"
                    quality:
                      type: object
                      properties:
                        success_rate:
                          type: number
                          minimum: 0
                          maximum: 1
                          description: "Tasso di successo (0-1)"
                        error_rate:
                          type: number
                          minimum: 0
                          maximum: 1
                          description: "Tasso di errore (0-1)"
                        jitter:
                          type: string
                          pattern: '^[0-9]+(\.[0-9]+)?(ns|us|ms|s)$'
                          description: "Variazione latenza"
                  required: ["id", "source", "target", "traffic"]
              metadata:
                type: object
                properties:
                  collection_time:
                    type: string
                    format: date-time
                    description: "Quando sono stati raccolti i dati"
                  collection_interval:
                    type: string
                    pattern: '^[0-9]+[smh]$'
                    description: "Intervallo di raccolta (es: 30s, 5m, 1h)"
                  data_source:
                    type: string
                    description: "Fonte dei dati (es: istio, cilium, prometheus)"
                  version:
                    type: string
                    description: "Versione dello schema dei dati"
          status:
            type: object
            properties:
              phase:
                type: string
                enum: ["Collecting", "Ready", "Error"]
                description: "Stato della raccolta dati"
              last_updated:
                type: string
                format: date-time
                description: "Ultimo aggiornamento"
              node_count:
                type: integer
                description: "Numero totale di nodi"
              edge_count:
                type: integer
                description: "Numero totale di archi"
              health:
                type: object
                properties:
                  healthy_nodes:
                    type: integer
                  unhealthy_nodes:
                    type: integer
                  total_traffic_volume:
                    type: string
                    description: "Volume totale del traffico"
  scope: Namespaced
  names:
    plural: networkgraphs
    singular: networkgraph
    kind: NetworkGraph
    shortNames:
    - netgraph
    - ng